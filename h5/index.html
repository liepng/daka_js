<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>每日打卡</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <!-- PWA 支持 -->
    <meta name="theme-color" content="#07c160">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app"></div>

    <nav class="tab-bar" id="tabBar">
        <div class="tab-item active" data-page="home">
            <span class="tab-icon">🏠</span>
            <span class="tab-text">首页</span>
        </div>
        <div class="tab-item" data-page="checkin">
            <span class="tab-icon">➕</span>
            <span class="tab-text">打卡</span>
        </div>
        <div class="tab-item" data-page="history">
            <span class="tab-icon">📋</span>
            <span class="tab-text">记录</span>
        </div>
        <div class="tab-item" data-page="profile">
            <span class="tab-icon">👤</span>
            <span class="tab-text">我的</span>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/bundle.js"></script>
</body>
</html>
